<!doctype html>
<html>
    <head>
        <title>Functions</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="./assets/reset.css" rel="stylesheet">
        <link href="./assets/style.css" rel="stylesheet">
    </head>

    <body>
        <h1 class="title"><span>DECODED</span><br>Lines</h1>
        
        

        <button id="info-btn">
            <img src="./assets/icons/info.svg" class="icon" />
        </button>

        <section id="info-modal" >
            <section class="modal-content">
                <button id="info-modal-close">Close</button>
                <h2>About Decoded Lines</h2>
                <p>Description</p>
            </section>
        </section>




        <section id="topic-filters">
            <button class="filter-btn active" data-filter="All">For You</button>
            <button class="filter-btn" data-filter="Economy">Economy</button>
            <button class="filter-btn" data-filter="Immigration">Immigration</button>
            <button class="filter-btn" data-filter="Elections">Elections</button>
            <button class="filter-btn" data-filter="Healthcare">Healthcare</button>
            <button class="filter-btn" data-filter="Constitutional">Constitutional</button>
        </section>


        <ul id="data-list"></ul>

        
        

        

        <section id="post-modal" hidden>
            <section class="modal-content post-modal-contain">
                <button id="post-modal-close">Close</button>
                <section id="post-modal-inner"></section>

                <!-- inline term panel -->
                <section id="inline-term-panel" hidden>
                    <!-- asked claude if there was an element for a divider without using div/section -->
                    <!-- conversation: https://claude.ai/share/006c92fb-82f7-4ccf-8718-d97494780522 -->
                    <hr class="term-divider">
                    <button id="term-back" class="hidden">
                        <img src="./assets/icons/back.svg" class="icon" />
                    </button>
                    <button id="inline-term-close">
                        <img src="./assets/icons/close.svg" class="icon" />
                    </button>

                    <section class="term-header">
                        <h2 id="inline-term-name"></h2>
                        <p id="inline-term-topic"></p>
                    </section>
                    <p id="inline-term-definition"></p>
                    <h3>Related Terms</h3>
                    <ul id="inline-term-related"></ul>
                </section>

            </section>
        </section>

        

        <script src="./rhet-json/main.js"></script>

    </body>


</html>
